    <!-- Right Column: High-Contrast Dark Mode Terminal Text -->
    <text x="630" y="65" class="text-title">Swarupanand Deshmukh</text>
    <text x="630" y="85" class="cc">--------------------------------------------------------------</text>
    
    <!-- Education & Focus -->
    <text x="630" y="110"><tspan class="cc">. </tspan><tspan class="key">Host</tspan>:<tspan class="cc"> .................. </tspan><tspan class="value">Pune Institute of Computer Technology (PICT)</tspan></text>
