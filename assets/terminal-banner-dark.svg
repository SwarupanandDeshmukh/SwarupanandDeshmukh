<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="100%" height="100%">
  <defs>
    <!-- Top-to-bottom reveal animation mask -->
    <clipPath id="loading-clip">
      <rect x="0" y="0" width="1280" height="0">
        <animate attributeName="height" from="0" to="620" dur="2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <style>
    @font-face {
      src: local('Consolas'), local('Consolas Bold');
      font-family: 'ConsolasFallback';
      font-display: swap;
    }
    /* Terminal UI Theme */
    .terminal-bg { fill: #0d1117; rx: 15px; }
    .window-header { fill: #161b22; rx: 15px; }
    .circle-red { fill: #ff5f56; }
    .circle-yellow { fill: #ffbd2e; }
    .circle-green { fill: #27c93f; }
    
    /* Photo Frame Preview Card (Darkened to sleek metallic slate-grey) */
    .photo-frame { fill: #cbd5e1; stroke: #475569; stroke-width: 1.5px; rx: 10px; }
    
    /* High-Contrast Syntax Highlighting */
    .key { fill: #ffa657; font-family: 'ConsolasFallback', Consolas, monospace; font-size: 14px; font-weight: bold; }
    .value { fill: #e6edf3; font-family: 'ConsolasFallback', Consolas, monospace; font-size: 14px; }
    .cc { fill: #484f58; font-family: 'ConsolasFallback', Consolas, monospace; font-size: 14px; }
    .text-title { font-family: 'ConsolasFallback', Consolas, monospace; font-size: 15px; font-weight: bold; fill: #58a6ff; }
    
    /* Crisp Charcoal Text for 100% Accurate ASCII Recognition */
    .text-ascii { font-family: 'ConsolasFallback', Consolas, monospace; font-size: 9.2px; fill: #1f2328; }
    
    text, tspan { white-space: pre; }
    .animated-content { clip-path: url(#loading-clip); }
  </style>

  <!-- Terminal Window Wrapper -->
  <rect width="1280" height="620" class="terminal-bg" />
  <path d="M0,0 H1280 V35 H0 Z" class="window-header" />
  
  <!-- Window Controls -->
  <circle cx="25" cy="18" r="6" class="circle-red" />
  <circle cx="45" cy="18" r="6" class="circle-yellow" />
  <circle cx="65" cy="18" r="6" class="circle-green" />

  <!-- Animated Terminal Content -->
  <g class="animated-content">
    <!-- Left Column: Frosted Slate-Grey Preview Frame Card -->
    <rect x="15" y="45" width="590" height="545" class="photo-frame" />

