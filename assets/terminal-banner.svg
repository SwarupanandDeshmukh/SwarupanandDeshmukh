<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <defs>
    <!-- The trick to the top-to-bottom loading effect: an animating mask -->
    <clipPath id="loading-clip">
      <rect x="0" y="0" width="800" height="0">
        <animate attributeName="height" from="0" to="350" dur="2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <style>
    .terminal-bg { fill: #0d1117; rx: 8px; }
    .window-header { fill: #161b22; rx: 8px; }
    .circle-red { fill: #ff5f56; }
    .circle-yellow { fill: #ffbd2e; }
    .circle-green { fill: #27c93f; }
    .text-title { font-family: 'Courier New', Courier, monospace; font-size: 16px; font-weight: bold; fill: #58a6ff; }
    .text-body { font-family: 'Courier New', Courier, monospace; font-size: 13px; fill: #c9d1d9; white-space: pre; }
    .text-accent { fill: #79c0ff; font-weight: bold; }
    .animated-content { clip-path: url(#loading-clip); }
  </style>

  <!-- Terminal Window Wrapper -->
  <rect width="800" height="350" class="terminal-bg" />
  <path d="M0,0 H800 V30 H0 Z" class="window-header" />
  
  <!-- Window Controls -->
  <circle cx="20" cy="15" r="6" class="circle-red" />
  <circle cx="40" cy="15" r="6" class="circle-yellow" />
  <circle cx="60" cy="15" r="6" class="circle-green" />

  <!-- Animated Terminal Content -->
  <g class="animated-content">
