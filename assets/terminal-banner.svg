<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 600" width="100%" height="100%">
  <defs>
    <!-- Top-to-bottom reveal animation mask -->
    <clipPath id="loading-clip">
      <rect x="0" y="0" width="1180" height="0">
        <animate attributeName="height" from="0" to="600" dur="2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <style>
    @font-face {
      src: local('Consolas'), local('Consolas Bold');
      font-family: 'ConsolasFallback';
      font-display: swap;
    }
    .terminal-bg { fill: #f6f8fa; rx: 15px; }
    .window-header { fill: #e1e4e8; rx: 15px; }
    .circle-red { fill: #cf222e; }
    .circle-yellow { fill: #d1b100; }
    .circle-green { fill: #1a7f37; }
    .key { fill: #953800; font-family: 'ConsolasFallback', Consolas, monospace; font-size: 14px; font-weight: bold; }
    .value { fill: #0a3069; font-family: 'ConsolasFallback', Consolas, monospace; font-size: 14px; }
    .cc { fill: #c2cfde; font-family: 'ConsolasFallback', Consolas, monospace; font-size: 14px; }
    .text-title { font-family: 'ConsolasFallback', Consolas, monospace; font-size: 15px; font-weight: bold; fill: #24292f; }
    .text-ascii { font-family: 'ConsolasFallback', Consolas, monospace; font-size: 8.5px; fill: #24292f; }
    text, tspan { white-space: pre; }
    .animated-content { clip-path: url(#loading-clip); }
  </style>

  <!-- Terminal Window Wrapper -->
  <rect width="1180" height="600" class="terminal-bg" />
  <path d="M0,0 H1180 V35 H0 Z" class="window-header" />
  
  <!-- Window Controls -->
  <circle cx="25" cy="18" r="6" class="circle-red" />
  <circle cx="45" cy="18" r="6" class="circle-yellow" />
  <circle cx="65" cy="18" r="6" class="circle-green" />

  <!-- Animated Terminal Content -->
  <g class="animated-content">
